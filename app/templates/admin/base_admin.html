{% extends "base.html" %}
{% block content %}
<style>
  .admin-layout {
    display: flex;
    gap: 0;
    min-height: calc(100vh - 60px);
  }
  .admin-nav {
    width: 220px;
    min-width: 220px;
    background: #16213e;
    border-right: 1px solid #2a2a4a;
    padding: 1.5rem 0;
  }
  .admin-nav-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #6b7280;
    padding: 0 1.25rem;
    margin-bottom: 0.75rem;
  }
  .admin-nav a {
    display: block;
    padding: 0.55rem 1.25rem;
    color: #9ca3af;
    text-decoration: none;
    font-size: 0.9rem;
    font-family: 'Barlow', sans-serif;
    font-weight: 500;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }
  .admin-nav a:hover {
    color: #e0e0e0;
    background: rgba(249, 115, 22, 0.06);
  }
  .admin-nav a.active {
    color: #f97316;
    border-left-color: #f97316;
    background: rgba(249, 115, 22, 0.08);
  }
  .admin-body {
    flex: 1;
    padding: 2rem;
    max-width: 1100px;
  }
</style>

<div class="admin-layout">
  <nav class="admin-nav" aria-label="Admin navigation">
    <div class="admin-nav-title">Admin</div>
    <a href="{{ url_for('admin.branding') }}" class="{% if admin_page == 'branding' %}active{% endif %}">Branding</a>
    <a href="{{ url_for('admin.smtp') }}" class="{% if admin_page == 'smtp' %}active{% endif %}">SMTP / Email</a>
    <a href="{{ url_for('admin.users_list') }}" class="{% if admin_page == 'users' %}active{% endif %}">Users</a>
    <a href="{{ url_for('templates.template_list') }}" class="{% if admin_page == 'templates' %}active{% endif %}">Audit Templates</a>
    <a href="{{ url_for('admin.activity_logs') }}" class="{% if admin_page == 'logs' %}active{% endif %}">Activity Logs</a>
    <a href="{{ url_for('admin.import_legacy') }}" class="{% if admin_page == 'import' %}active{% endif %}">Import</a>
  </nav>
  <div class="admin-body">
    {% block admin_content %}{% endblock %}
  </div>
</div>
{% endblock %}
